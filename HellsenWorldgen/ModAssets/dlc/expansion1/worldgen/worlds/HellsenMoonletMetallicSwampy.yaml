name: STRINGS.HELLSEN.WORLDS.MINI_METALLIC_SWAMPY.NAME # Metallic Swampy Moonlet
description: STRINGS.HELLSEN.WORLDS.MINI_METALLIC_SWAMPY.DESC
nameTables: [SWAMP]
asteroidIcon: asteroid_mini_metallicswampy_kanim

worldTraitScale: 0.20 # Adjust with worldSize. Traits are tuned to base game world sizes.
worldsize:
  X: 128
  Y: 153
layoutMethod: PowerTree

worldTraitRules:
  - min: 1
    max: 2
    forbiddenTags:
      - StartWorldOnly # start already a bit random
      - Geodes
      - Oil
      - GenericGeysers
      - StartChange
      - LargeWorld
    forbiddenTraits:
      - traits/MagmaVents # difficult to place guaranteed POIs
      - expansion1::traits/Volcanoes # Takes up too much space
      - expansion1::traits/MetalCaves

fixedTraits:
  - sunlightMed
  - cosmicRadiationMed

defaultsOverrides:
  data:
    WorldBorderThickness: 3
    WorldBorderRange: 1
    OverworldDensityMin: 18
    OverworldDensityMax: 18
    OverworldAvoidRadius: 5
    OverworldSampleBehaviour: PoissonDisk
    POIPadding: 1
  startingWorldElements: [] # remove the algae check

# List all the subworld files to load
subworldFiles:
  - name: expansion1::subworlds/swamp/Swamp # non-start
  - name: subworlds/space/Space
  - name: expansion1::subworlds/space/SpaceWithSwampyBorder
  - name: expansion1::subworlds/marsh/med_HotMarshInactive
    minCount: 2
  - name: expansion1::subworlds/marsh/med_HotMarshMushrooms
    minCount: 2
  - name: expansion1::subworlds/metallic/SwampyRenewableMetallicCold
    minCount: 4
  - name: expansion1::subworlds/ferric_core/FerricCoreSmall

unknownCellsAllowedSubworlds:
  # Fill
  - tagcommand: Default
    command: Replace
    subworldNames:
      - expansion1::subworlds/marsh/med_HotMarshInactive
      - expansion1::subworlds/marsh/med_HotMarshMushrooms
      - expansion1::subworlds/metallic/SwampyRenewableMetallicCold
  # Non-Start swamp
  - tagcommand: DistanceFromTag
    tag: AtSurface
    minDistance: 2
    maxDistance: 2
    command: Replace
    subworldNames:
      - expansion1::subworlds/swamp/Swamp
      - expansion1::subworlds/marsh/med_HotMarshMushrooms
  - tagcommand: DistanceFromTag
    tag: AtSurface
    minDistance: 3
    maxDistance: 3
    command: Replace
    subworldNames:
      - expansion1::subworlds/swamp/Swamp
  # Space
  - tagcommand: AtTag
    tag: AtSurface
    command: Replace
    subworldNames:
      - subworlds/space/Space
  # Crust
  - tagcommand: DistanceFromTag
    tag: AtSurface
    minDistance: 1
    maxDistance: 1
    command: Replace
    subworldNames:
      - expansion1::subworlds/space/SpaceWithSwampyBorder
  # Core
  - tagcommand: AtTag
    tag: AtDepths
    command: Replace
    subworldNames:
      - expansion1::subworlds/ferric_core/FerricCoreSmall

worldTemplateRules:
  # Surface Ice Chunks
  - names:
      - expansion1::poi/mini/frozen_chunk_ice
      - expansion1::poi/mini/frozen_chunk_large
      - expansion1::poi/mini/frozen_chunk_metal
      - expansion1::poi/mini/frozen_chunk_shape
    listRule: TryAll
    allowDuplicates: true
    allowExtremeTemperatureOverlap: true
    useRelaxedFiltering: true
    overrideOffset:
      X: 0
      Y: -10
    priority: 200
    allowedCellsFilter:
      - command: Replace
        tagcommand: DistanceFromTag
        tag: AtSurface
        minDistance: 1
        maxDistance: 1
  # Gravitas Artifact POI
  - names:
      - expansion1::poi/genericGravitas/poi_office
    listRule: GuaranteeAll
    priority: 180
    allowedCellsFilter:
      - command: Replace
        tagcommand: NotAtTag
        tag: NoGlobalFeatureSpawning
  # Iron volcanoes in the core
  - names:
      - expansion1::geysers/core_molten_iron
    listRule: TryOne
    times: 3
    priority: 170
    allowDuplicates: true
    useRelaxedFiltering: true
    allowedCellsFilter:
      - command: Replace
        subworldNames:
          - expansion1::subworlds/ferric_core/FerricCoreSmall
      - command: ExceptWith
        tagcommand: AtTag
        tag: AtEdge
  # Marsh guaranteed methane
  - names:
      - poi/hotmarsh/geyser_methane
    listRule: GuaranteeOne
    priority: 160
    allowedCellsFilter:
      - command: Replace
        zoneTypes: [BoggyMarsh]
  # Guaranteed metallic volcanoes
  - names:
      - expansion1::geysers/molten_aluminum
      - expansion1::geysers/molten_cobalt
      - geysers/molten_copper
      - geysers/molten_gold
      - geysers/molten_iron
    listRule: GuaranteeAll
    useRelaxedFiltering: true
    priority: 150
    allowedCellsFilter:
      - command: Replace
        tagcommand: NotAtTag
        tag: NoGlobalFeatureSpawning
  # Curated geysers (no duplicates)
  - names:
      - geysers/hot_steam
      - geysers/steam
      - geysers/filthy_water
      - geysers/salt_water
      - geysers/slush_water
      - expansion1::geysers/slush_salt_water
    listRule: TryOne
    times: 3
    useRelaxedFiltering: true
    priority: 120
    allowedCellsFilter:
      - command: Replace
        tagcommand: NotAtTag
        tag: NoGlobalFeatureSpawning
  # Some generic geysers to spruce up the place
  - names:
      - geysers/generic
    listRule: TryOne
    times: 2
    ruleId: GenericGeysers
    useRelaxedFiltering: true
    allowDuplicates: true
    priority: 100
    allowedCellsFilter:
      - command: Replace
        tagcommand: NotAtTag
        tag: NoGlobalFeatureSpawning
  # Extra metallic volcanoes if there is space
  - names:
      - expansion1::poi/poi_molten_aluminum_volcano
      - expansion1::poi/poi_molten_gold_volcano
      - expansion1::poi/poi_molten_cobalt_volcano
    listRule: TryOne
    times: 2
    priority: 95
    allowedCellsFilter:
      - command: Replace
        zoneTypes: [Metallic]
      - command: IntersectWith
        tagcommand: DistanceFromTag
        tag: AtDepths
        minDistance: 1
        maxDistance: 3
  # Even more metallic volcanoes if there is space
  - names:
      - expansion1::geysers/molten_aluminum
      - expansion1::geysers/molten_cobalt
      - geysers/molten_copper
      - geysers/molten_gold
      - geysers/molten_iron
    listRule: TryOne
    times: 3
    useRelaxedFiltering: true
    priority: 90
    allowedCellsFilter:
      - command: Replace
        tagcommand: NotAtTag
        tag: NoGlobalFeatureSpawning
