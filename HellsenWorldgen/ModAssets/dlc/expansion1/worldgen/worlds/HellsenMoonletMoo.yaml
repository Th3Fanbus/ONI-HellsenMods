name: STRINGS.HELLSEN.WORLDS.MOO_MOONLET.NAME # Moo Moonlet
description: STRINGS.HELLSEN.WORLDS.MOO_MOONLET.DESC
nameTables: [MOO]
asteroidIcon: asteroid_moo_planet_kanim

worldTraitScale: 0.12 # Adjust with worldSize. Traits are tuned to base game world sizes.
worldsize:
  X: 96
  Y: 80
layoutMethod: PowerTree

disableWorldTraits: true # insufficient traits to support world

worldTraitRules:
  - min: 0
    max: 1
    forbiddenTags:
      - StartWorldOnly
      - GenericGeysers
      - Surface
      - StartChange
      - Oil
      - Geodes # features are all full
      - LargeWorld
      - Metal # none on world
    forbiddenTraits:
      - traits/MagmaVents
      - expansion1::traits/Volcanoes
      - traits/SlimeSplats

fixedTraits:
  - sunlightVeryHigh
  - cosmicRadiationMedHigh

seasons:
  - GassyMooteorShowers

defaultsOverrides:
  data:
    WorldBorderThickness: 2
    WorldBorderRange: 1
    OverworldDensityMin: 15
    OverworldDensityMax: 15
    OverworldAvoidRadius: 5
    OverworldSampleBehaviour: PoissonDisk
    POIPadding: 1

# List all the subworld files to load
subworldFiles:
  - name: subworlds/space/Space
  - name: expansion1::subworlds/moo/MooCaverns
  - name: expansion1::subworlds/moo/MooChasms
  - name: expansion1::subworlds/moo/MooCore

unknownCellsAllowedSubworlds:
  - tagcommand: Default
    command: Replace
    subworldNames:
      - expansion1::subworlds/moo/MooCaverns
  - tagcommand: AtTag
    tag: AtEdge
    command: Replace
    subworldNames:
      - expansion1::subworlds/moo/MooChasms
  - tagcommand: AtTag
    tag: AtSurface
    command: Replace
    subworldNames:
      - subworlds/space/Space
  - tagcommand: DistanceFromTag
    tag: AtSurface
    minDistance: 1
    maxDistance: 1
    command: Replace
    subworldNames:
      - subworlds/space/Space
  - tagcommand: AtTag
    tag: AtDepths
    command: Replace
    subworldNames:
      - expansion1::subworlds/moo/MooCore

# note: The included subworlds have a heavy number of features, these templates will fail the first time
#       and be placed using relaxed rules instead. This is expected behaviour.
worldTemplateRules:
  # Gravitas
  - names:
      - expansion1::poi/genericGravitas/poi_genetics_lab
    listRule: GuaranteeAll
    priority: 500
    allowedCellsFilter:
      - command: Replace
        tagcommand: DistanceFromTag
        tag: AtSurface
        minDistance: 1
        maxDistance: 99
      - command: ExceptWith
        zoneTypes: [Space]
      - command: ExceptWith
        tagcommand: AtTag
        tag: NoGravitasFeatures
  # Chlorine sources
  - names:
      - geysers/chlorine_gas # supports 100+ plants
      - geysers/liquid_chlorine
    listRule: GuaranteeAll
    priority: 100
    allowedCellsFilter:
      - command: Replace
        tagcommand: DistanceFromTag
        tag: AtSurface
        minDistance: 1
        maxDistance: 99
      - command: ExceptWith
        zoneTypes: [Space]
      - command: ExceptWith
        tagcommand: AtTag
        tag: NoGravitasFeatures
  # Crashed satellites
  - names:
      - expansion1::poi/crashed_satellite_abyssalite
    listRule: GuaranteeAll
    priority: 90
    useRelaxedFiltering: true
    allowedCellsFilter:
      - command: Replace
        tagcommand: DistanceFromTag
        tag: AtDepths
        minDistance: 0
        maxDistance: 2
      - command: ExceptWith
        zoneTypes: [Space]
