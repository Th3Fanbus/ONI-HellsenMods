name: STRINGS.HELLSEN.WORLDS.FORESTY_WASTELAND.NAME # Glowood Wasteland Moonlet
description: STRINGS.HELLSEN.WORLDS.FORESTY_WASTELAND.DESC
nameTables: [FOREST, RADIOACTIVE]
asteroidIcon: asteroid_hellsen_foresty_wasteland_kanim

worldTraitScale: 0.20 # Adjust with worldSize. Traits are tuned to base game world sizes.
worldsize:
  X: 128
  Y: 153
layoutMethod: PowerTree

worldTraitRules:
  - min: 1
    max: 2
    forbiddenTags:
      - StartWorldOnly # start already a bit random
      - GenericGeysers
      - LargeWorld
      - Oil # no oil here
      - Surface # surface is too specific
      - VeryCold
      - StartChange
      - Core
      - AboveCore
      - Crust # not for this world layout
    forbiddenTraits:
      - traits/MagmaVents # difficult to place guaranteed POIs
      - expansion1::traits/Volcanoes # Takes up too much space

fixedTraits:
  - sunlightLow
  - cosmicRadiationMed

defaultsOverrides:
  data:
    WorldBorderThickness: 3
    WorldBorderRange: 1
    OverworldDensityMin: 18
    OverworldDensityMax: 18
    OverworldAvoidRadius: 5
    OverworldSampleBehaviour: PoissonDisk
    POIPadding: 1

# List all the subworld files to load
subworldFiles:
  - name: subworlds/space/Space
  - name: expansion1::subworlds/space/SpaceWithBorder
  - name: expansion1::subworlds/ocean/med_Ocean
    minCount: 3
  - name: expansion1::subworlds/forest/med_Forest
    minCount: 3
  - name: expansion1::subworlds/rust/med_Rust_NoSpirals
    minCount: 3
  - name: expansion1::subworlds/radioactive/med_Radioactive
    minCount: 3
  - name: expansion1::subworlds/radioactive/med_UraniumFields
    minCount: 2
  - name: expansion1::subworlds/radioactive/med_FrozenUraniumFields
    minCount: 2
  - name: expansion1::subworlds/frozen/FrozenCore
    weight: 0.4
    maxCount: 2

unknownCellsAllowedSubworlds:
  # World Fill
  - tagcommand: Default
    command: Replace
    subworldNames:
      - expansion1::subworlds/forest/med_Forest
      - expansion1::subworlds/rust/med_Rust_NoSpirals
  # Space
  - tagcommand: AtTag
    tag: AtSurface
    command: Replace
    subworldNames:
      - subworlds/space/Space
  # Crust
  - tagcommand: DistanceFromTag
    tag: AtSurface
    minDistance: 1
    maxDistance: 1
    command: Replace
    subworldNames:
      - expansion1::subworlds/space/SpaceWithBorder
  # Subsurface Ocean
  - tagcommand: DistanceFromTag
    tag: AtSurface
    minDistance: 2
    maxDistance: 2
    command: Replace
    subworldNames:
      - expansion1::subworlds/ocean/med_Ocean
  # Above Mantle
  - tagcommand: DistanceFromTag
    tag: AtDepths
    minDistance: 2
    maxDistance: 2
    command: Replace
    subworldNames:
      - expansion1::subworlds/forest/med_Forest
      - expansion1::subworlds/rust/med_Rust_NoSpirals
  # Mantle
  - tagcommand: DistanceFromTag
    tag: AtDepths
    minDistance: 1
    maxDistance: 1
    command: Replace
    subworldNames:
      - expansion1::subworlds/radioactive/med_Radioactive
      - expansion1::subworlds/radioactive/med_UraniumFields
  # Core
  - tagcommand: AtTag
    tag: AtDepths
    command: Replace
    subworldNames:
      - expansion1::subworlds/radioactive/med_FrozenUraniumFields
      - expansion1::subworlds/frozen/FrozenCore

worldTemplateRules:
  # Guaranteed water source in subsurface ocean
  - names:
      - poi/poi_ocean_geyser_saltwater
    listRule: GuaranteeAll
    useRelaxedFiltering: true
    priority: 160
    allowedCellsFilter:
      - command: Replace
        zoneTypes: [Ocean]
  # Frozen Uranium
  - names:
      - expansion1::poi/radioactive/uranium_fields_liquid_co2_geyser
      - expansion1::poi/radioactive/uranium_fields_liquid_co2_geyser_b
      - expansion1::poi/radioactive/uranium_fields_liquid_co2_geyser_c
    listRule: TrySome
    someCount: 2
    priority: 150
    allowedCellsFilter:
      - command: Replace
        zoneTypes: [Radioactive]
  # Gravitas Artifact POIs
  - names:
      - expansion1::poi/genericGravitas/directors_room
      - expansion1::poi/genericGravitas/monument_room
    listRule: GuaranteeAll
    priority: 140
    allowedCellsFilter:
      - command: Replace
        tagcommand: NotAtTag
        tag: NoGlobalFeatureSpawning
      - command: ExceptWith
        tagcommand: DistanceFromTag
        tag: AtDepths
        minDistance: 0
        maxDistance: 1
  # Guaranteed chlorine (pufts)
  - names:
      - geysers/chlorine_gas
    listRule: GuaranteeAll
    useRelaxedFiltering: true
    priority: 130
    allowedCellsFilter:
      - command: Replace
        tagcommand: NotAtTag
        tag: NoGlobalFeatureSpawning
  # Curated geysers
  - names:
      - geysers/methane
      - geysers/hot_hydrogen
      - geysers/big_volcano
      - geysers/small_volcano
    listRule: TryOne
    times: 2
    useRelaxedFiltering: true
    priority: 120
    allowedCellsFilter:
      - command: Replace
        tagcommand: NotAtTag
        tag: NoGlobalFeatureSpawning
  # Extra water sources (compensates lack of water moonlet)
  - names:
      - geysers/steam
      - geysers/hot_steam
      - geysers/hot_water
      - geysers/filthy_water
      - geysers/salt_water
      - geysers/slush_water
      - expansion1::geysers/slush_salt_water
    listRule: TryOne
    times: 3
    useRelaxedFiltering: true
    priority: 110
    allowedCellsFilter:
      - command: Replace
        tagcommand: NotAtTag
        tag: NoGlobalFeatureSpawning
  # Some generic geysers to spruce up the place
  - names:
      - geysers/generic
    listRule: TryOne
    times: 2
    ruleId: GenericGeysers
    useRelaxedFiltering: true
    allowDuplicates: true
    priority: 100
    allowedCellsFilter:
      - command: Replace
        tagcommand: NotAtTag
        tag: NoGlobalFeatureSpawning
  # Boons
  - names:
      - expansion1::poi/boon/hellsen_greathall
    listRule: GuaranteeAll
    priority: 75
    allowedCellsFilter:
      - command: Replace
        tagcommand: NotAtTag
        tag: NoGlobalFeatureSpawning
      - command: ExceptWith
        tagcommand: DistanceFromTag
        tag: AtDepths
        minDistance: 0
        maxDistance: 1
